name: "Model Disagreement Metric"
acronym: "MDM"
version: "1.2"
type: "model_based"
mode: "batch"

description: >
  Pair-wise output-level disagreement detector for ensembles of co-deployed
  predictive models. Designed for the soft-sensor regime in which fresh
  ground-truth labels arrive offline hours-to-days late, so residual-based
  monitoring is unavailable. MDM is a pluggable orchestrator: the set of
  pair-wise statistics is supplied by ``metrics=[...]`` (a list of
  DisagreementMetric instances; default trio is MSE + Pearson + Spearman).
  Users can turn metrics on or off, or register their own by subclassing
  DisagreementMetric. Each metric declares a ``kind`` (currently ``"error"``
  or ``"correlation"``); MDM aggregates per kind and never averages across
  kinds, because magnitude errors and correlation-based disagreements are
  dimensionally and conceptually inhomogeneous.

inputs:
  predictions:
    description: "Sequence of >=2 1-D NumPy arrays, one per co-deployed model.
                  All arrays must have the same length."

parameters:
  metrics:
    description: "Sequence of DisagreementMetric instances; default is
                  [MSEDisagreement(), PearsonDisagreement(), SpearmanDisagreement()]."
  threshold:
    description: "Disagreement above which drift is flagged. Compared against
                  the error-family aggregate (score field)."

output:
  description: >
    Per-kind aggregate disagreement in [0, 1], plus per-metric and pair-wise
    breakdowns in the details dict.
  fields:
    score:
      description: >
        Error-family aggregate -- the mean over error-kind metrics of the
        mean over pairs. Used as the operational drift signal.
    drift:
      description: "True iff score (error family) >= threshold."
    details.score_by_kind:
      description: >
        Dict mapping each kind in use (e.g. error, correlation) to its
        per-kind aggregate.
    details.metric_means:
      description: "Mean disagreement per individual metric."
    details.pairwise:
      description: "NxN symmetric matrix per metric."

references:
  - "Suarez, C. et al. (2026). STAMM: Soft sensor moniToring and mAintenance
     framework for Machine learning Models. SoftwareX (under review)."
  - "Bayram, F., Ahmed, B. S., Kassler, A. (2022). From concept drift to model
     degradation: an overview on performance-aware drift detectors.
     Knowledge-Based Systems 245, 108632."
